    <script>
        function openModal(piloto) { document.getElementById('modal-' + piloto).classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeModal(piloto) { document.getElementById('modal-' + piloto).classList.remove('active'); document.body.style.overflow = 'auto'; }
        document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function (e) { e.preventDefault(); document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' }); }); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { document.querySelectorAll('.modal').forEach(modal => { modal.classList.remove('active'); }); document.body.style.overflow = 'auto'; } });
    </script>
